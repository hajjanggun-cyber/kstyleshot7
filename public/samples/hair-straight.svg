<svg width='900' height='1200' viewBox='0 0 900 1200' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Straight'>
  <defs>
    <linearGradient id='bg' x1='0.2' y1='0' x2='0.8' y2='1'>
      <stop offset='0%' stop-color='#1a1a1a'/>
      <stop offset='55%' stop-color='#2d2d2d'/>
      <stop offset='100%' stop-color='#3f3f3f'/>
    </linearGradient>
    <radialGradient id='halo' cx='0.5' cy='0.2' r='0.6'>
      <stop offset='0%' stop-color='#ffffff' stop-opacity='0.18'/>
      <stop offset='100%' stop-color='#ffffff' stop-opacity='0'/>
    </radialGradient>
  </defs>
  <rect width='900' height='1200' fill='url(#bg)'/>
  <rect width='900' height='1200' fill='url(#halo)'/>
  <g opacity='0.15'>
    <circle cx='100' cy='1070' r='200' fill='#888888'/>
    <circle cx='830' cy='190' r='150' fill='#aaaaaa'/>
  </g>

  <g transform='translate(170 250)'>
    <!-- body -->
    <rect x='24' y='440' width='520' height='360' rx='220' fill='rgba(255,255,255,0.82)'/>
    <!-- left side hair panel (straight, falls past shoulders) -->
    <path d='M118 200 L100 720 Q104 760 140 762 Q176 760 182 720 L172 200' fill='#0e0e0e'/>
    <!-- right side hair panel -->
    <path d='M450 200 L468 720 Q464 760 428 762 Q392 760 386 720 L396 200' fill='#0e0e0e'/>
    <!-- hair cap with center parting -->
    <path d='M118 200 Q118 148 200 148 Q252 148 284 160 Q316 148 368 148 Q450 148 450 200 Q420 175 284 178 Q148 175 118 200' fill='#0e0e0e'/>
    <!-- face -->
    <circle cx='284' cy='314' r='162' fill='#f5e9e2' fill-opacity='0.95'/>
    <!-- center parting line on crown -->
    <rect x='276' y='148' width='16' height='52' rx='8' fill='#f5e9e2' fill-opacity='0.4'/>
  </g>

  <g transform='translate(70 76)'>
    <rect width='760' height='148' rx='28' fill='rgba(8,8,8,0.40)'/>
    <text x='34' y='64' fill='#ffffff' font-size='44' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='700'>Straight</text>
    <text x='34' y='116' fill='#d8d8d8' font-size='26' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='500'>Sleek, polished finish</text>
  </g>
  <g transform='translate(70 1040)'>
    <rect width='300' height='72' rx='36' fill='rgba(255,255,255,0.16)'/>
    <text x='36' y='46' fill='#ffffff' font-size='27' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='700'>Kstyleshot</text>
  </g>
</svg>
