<svg width='900' height='1200' viewBox='0 0 900 1200' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Half-Up Half-Down'>
  <defs>
    <linearGradient id='bg' x1='0.2' y1='0' x2='0.8' y2='1'>
      <stop offset='0%' stop-color='#3d2b1f'/>
      <stop offset='55%' stop-color='#5c3d2e'/>
      <stop offset='100%' stop-color='#7a5244'/>
    </linearGradient>
    <radialGradient id='halo' cx='0.5' cy='0.2' r='0.6'>
      <stop offset='0%' stop-color='#ffb890' stop-opacity='0.20'/>
      <stop offset='100%' stop-color='#ffb890' stop-opacity='0'/>
    </radialGradient>
  </defs>
  <rect width='900' height='1200' fill='url(#bg)'/>
  <rect width='900' height='1200' fill='url(#halo)'/>
  <g opacity='0.18'>
    <circle cx='110' cy='1080' r='200' fill='#4a2e1e'/>
    <circle cx='820' cy='180' r='150' fill='#8a5a40'/>
  </g>

  <g transform='translate(170 250)'>
    <!-- body -->
    <rect x='24' y='440' width='520' height='360' rx='220' fill='rgba(255,255,255,0.82)'/>
    <!-- lower half hair (flowing down both sides) -->
    <path d='M130 400 L112 700 Q116 740 150 742 Q186 740 192 700 L182 400' fill='#120e0a'/>
    <path d='M438 400 L456 700 Q452 740 416 742 Q380 740 376 700 L386 400' fill='#120e0a'/>
    <!-- hair cap (top half pulled up) -->
    <path d='M136 314 Q136 148 284 148 Q432 148 432 314 Q400 275 284 270 Q168 275 136 314' fill='#120e0a'/>
    <!-- half-up twist / gathered section at crown -->
    <ellipse cx='284' cy='210' rx='88' ry='36' fill='#0a0806'/>
    <ellipse cx='284' cy='200' rx='64' ry='24' fill='#180e08'/>
    <!-- elastic detail -->
    <rect x='264' y='232' width='40' height='14' rx='7' fill='#0a0604'/>
    <!-- face -->
    <circle cx='284' cy='314' r='162' fill='#f5e9e2' fill-opacity='0.95'/>
  </g>

  <g transform='translate(70 76)'>
    <rect width='760' height='148' rx='28' fill='rgba(12,8,4,0.38)'/>
    <text x='34' y='64' fill='#ffffff' font-size='38' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='700'>Half-Up Half-Down</text>
    <text x='34' y='116' fill='#ffd0a0' font-size='26' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='500'>Volume at the crown</text>
  </g>
  <g transform='translate(70 1040)'>
    <rect width='300' height='72' rx='36' fill='rgba(255,255,255,0.16)'/>
    <text x='36' y='46' fill='#ffffff' font-size='27' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='700'>Kstyleshot</text>
  </g>
</svg>
