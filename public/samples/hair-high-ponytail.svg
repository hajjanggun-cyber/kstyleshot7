<svg width='900' height='1200' viewBox='0 0 900 1200' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='High Ponytail'>
  <defs>
    <linearGradient id='bg' x1='0.2' y1='0' x2='0.8' y2='1'>
      <stop offset='0%' stop-color='#2c1810'/>
      <stop offset='55%' stop-color='#5c3a28'/>
      <stop offset='100%' stop-color='#8a5a40'/>
    </linearGradient>
    <radialGradient id='halo' cx='0.5' cy='0.2' r='0.6'>
      <stop offset='0%' stop-color='#ffb880' stop-opacity='0.22'/>
      <stop offset='100%' stop-color='#ffb880' stop-opacity='0'/>
    </radialGradient>
  </defs>
  <rect width='900' height='1200' fill='url(#bg)'/>
  <rect width='900' height='1200' fill='url(#halo)'/>
  <g opacity='0.18'>
    <circle cx='110' cy='1080' r='200' fill='#7a4a28'/>
    <circle cx='820' cy='180' r='150' fill='#c07848'/>
  </g>

  <g transform='translate(170 250)'>
    <!-- body -->
    <rect x='24' y='440' width='520' height='360' rx='220' fill='rgba(255,255,255,0.82)'/>
    <!-- tight hair cap on sides (hair pulled back) -->
    <path d='M148 314 Q148 148 284 148 Q420 148 420 314 Q400 270 284 265 Q168 270 148 314' fill='#100806'/>
    <!-- left ear stray (minimal side hair) -->
    <path d='M148 314 L132 380 L158 384 L168 314' fill='#100806'/>
    <!-- right ear stray -->
    <path d='M420 314 L436 380 L410 384 L400 314' fill='#100806'/>
    <!-- ponytail stem going up from crown -->
    <rect x='264' y='0' width='40' height='162' rx='20' fill='#100806'/>
    <!-- ponytail bun at top -->
    <circle cx='284' cy='0' r='72' fill='#1a1008'/>
    <!-- bun detail ring -->
    <circle cx='284' cy='0' r='52' fill='none' stroke='#2a1a0e' stroke-width='12'/>
    <!-- elastic at base of ponytail -->
    <rect x='258' y='148' width='52' height='18' rx='9' fill='#0a0604'/>
    <!-- face -->
    <circle cx='284' cy='314' r='162' fill='#f5e9e2' fill-opacity='0.95'/>
  </g>

  <g transform='translate(70 76)'>
    <rect width='760' height='148' rx='28' fill='rgba(14,6,2,0.38)'/>
    <text x='34' y='64' fill='#ffffff' font-size='44' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='700'>High Ponytail</text>
    <text x='34' y='116' fill='#ffd8b0' font-size='26' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='500'>Clean, lifted silhouette</text>
  </g>
  <g transform='translate(70 1040)'>
    <rect width='300' height='72' rx='36' fill='rgba(255,255,255,0.16)'/>
    <text x='36' y='46' fill='#ffffff' font-size='27' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='700'>Kstyleshot</text>
  </g>
</svg>
