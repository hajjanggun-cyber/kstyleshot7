<svg width='900' height='1200' viewBox='0 0 900 1200' xmlns='http://www.w3.org/2000/svg' role='img' aria-label='Space Buns'>
  <defs>
    <linearGradient id='bg' x1='0.2' y1='0' x2='0.8' y2='1'>
      <stop offset='0%' stop-color='#1a2a6c'/>
      <stop offset='55%' stop-color='#4a90d9'/>
      <stop offset='100%' stop-color='#8ecae6'/>
    </linearGradient>
    <radialGradient id='halo' cx='0.5' cy='0.2' r='0.6'>
      <stop offset='0%' stop-color='#a0e0ff' stop-opacity='0.28'/>
      <stop offset='100%' stop-color='#a0e0ff' stop-opacity='0'/>
    </radialGradient>
  </defs>
  <rect width='900' height='1200' fill='url(#bg)'/>
  <rect width='900' height='1200' fill='url(#halo)'/>
  <g opacity='0.18'>
    <circle cx='110' cy='1080' r='200' fill='#2040a0'/>
    <circle cx='820' cy='180' r='150' fill='#70c8f0'/>
  </g>

  <g transform='translate(170 250)'>
    <!-- body -->
    <rect x='24' y='440' width='520' height='360' rx='220' fill='rgba(255,255,255,0.82)'/>
    <!-- hair cap base (covers top of head between buns) -->
    <path d='M152 260 Q152 148 284 148 Q416 148 416 260 Q380 225 284 222 Q188 225 152 260' fill='#0c1430'/>
    <!-- short side strands -->
    <path d='M152 260 L138 380 L166 384 L178 260' fill='#0c1430'/>
    <path d='M416 260 L430 380 L402 384 L390 260' fill='#0c1430'/>
    <!-- left bun base stem -->
    <rect x='158' y='100' width='36' height='78' rx='18' fill='#0c1430'/>
    <!-- right bun base stem -->
    <rect x='374' y='100' width='36' height='78' rx='18' fill='#0c1430'/>
    <!-- left space bun -->
    <circle cx='176' cy='82' r='78' fill='#0e1836'/>
    <circle cx='176' cy='82' r='56' fill='none' stroke='#1a2a54' stroke-width='14'/>
    <circle cx='176' cy='82' r='28' fill='#0a1028'/>
    <!-- right space bun -->
    <circle cx='392' cy='82' r='78' fill='#0e1836'/>
    <circle cx='392' cy='82' r='56' fill='none' stroke='#1a2a54' stroke-width='14'/>
    <circle cx='392' cy='82' r='28' fill='#0a1028'/>
    <!-- face -->
    <circle cx='284' cy='314' r='162' fill='#f5e9e2' fill-opacity='0.95'/>
  </g>

  <g transform='translate(70 76)'>
    <rect width='760' height='148' rx='28' fill='rgba(6,10,30,0.40)'/>
    <text x='34' y='64' fill='#ffffff' font-size='44' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='700'>Space Buns</text>
    <text x='34' y='116' fill='#b8e8ff' font-size='26' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='500'>Playful, youthful energy</text>
  </g>
  <g transform='translate(70 1040)'>
    <rect width='300' height='72' rx='36' fill='rgba(255,255,255,0.16)'/>
    <text x='36' y='46' fill='#ffffff' font-size='27' font-family='Spline Sans, Pretendard, Arial, sans-serif' font-weight='700'>Kstyleshot</text>
  </g>
</svg>
