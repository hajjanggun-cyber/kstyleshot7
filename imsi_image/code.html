<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4257b",
                        "background-light": "#f8f5f7",
                        "background-dark": "#221017",
                    },
                    fontFamily: {
                        "display": ["Spline Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation -->
<header class="flex items-center justify-between border-b border-primary/20 px-6 py-4 lg:px-40">
<div class="flex items-center gap-3">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">auto_awesome</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">K-Style Magic</h2>
</div>
<div class="flex gap-3">
<button class="flex items-center justify-center rounded-full h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">history</span>
</button>
<button class="flex items-center justify-center rounded-full h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center px-4 py-8 lg:px-40">
<!-- Title Section -->
<div class="text-center mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl lg:text-4xl font-bold leading-tight mb-2">You look amazing!</h1>
<p class="text-primary font-medium">Your K-POP Transformation is complete</p>
</div>
<!-- Main Synthesized Image Frame -->
<div class="w-full max-w-[600px] relative group">
<!-- Celebration Sparkle Effects (Visual gradients) -->
<div class="absolute -inset-1 bg-gradient-to-r from-primary/50 to-purple-500/50 rounded-xl blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
<div class="relative flex flex-col bg-slate-100 dark:bg-slate-800 rounded-xl overflow-hidden shadow-2xl border border-primary/10">
<div class="aspect-[3/4] w-full bg-cover bg-center" data-alt="User face with K-POP styling at Gyeongbokgung Palace background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBZH8JiKE_Cu8wjs-CopA3VACeNPB8gf4T38iVrfBxUwhUoFXPoej1EssHTHtRC0IgHmKm47bEh5FW9jhVCGyUVjFxu_xSD3omcjHqPiemCw7Dlb6Mss-6T5rPYsaoszNtmjDzJiXy7e7c64daubfTgbvCxp3stMW7O08SKVmrKVzOdSoVHwastUUNX2Ey6-qhcfK4391HIk0cs1iy3zKkATgacgcm6_7XdkyYH49VTjDItsV6hOzARoB2w0xOeYlY3clvMe3mn-PRC');">
</div>
<div class="p-5 bg-white dark:bg-slate-900 flex justify-between items-center border-t border-primary/5">
<div>
<h3 class="text-slate-900 dark:text-slate-100 font-bold text-lg">Seoul Superstar Look</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm flex items-center gap-1">
<span class="material-symbols-outlined text-sm">location_on</span> Gyeongbokgung Palace
                                </p>
</div>
<div class="flex gap-2">
<span class="bg-primary/10 text-primary text-[10px] px-2 py-1 rounded-full uppercase font-bold tracking-widest">Premium AI</span>
</div>
</div>
</div>
</div>
<!-- Quick Share Icons -->
<div class="w-full max-w-[480px] mt-8">
<div class="grid grid-cols-3 gap-4 mb-8">
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="size-14 rounded-full bg-primary/10 text-primary flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-all">
<span class="material-symbols-outlined">download</span>
</div>
<p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 group-hover:text-primary">Download</p>
</div>
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="size-14 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 flex items-center justify-center group-hover:bg-[#E1306C] group-hover:text-white transition-all">
<span class="material-symbols-outlined text-2xl">photo_camera</span>
</div>
<p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Instagram</p>
</div>
<div class="flex flex-col items-center gap-2 group cursor-pointer">
<div class="size-14 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 flex items-center justify-center group-hover:bg-black group-hover:text-white transition-all">
<span class="material-symbols-outlined text-2xl">music_note</span>
</div>
<p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">TikTok</p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<button class="flex items-center justify-center gap-2 rounded-full h-14 bg-primary text-white text-lg font-bold shadow-lg shadow-primary/30 hover:scale-[1.02] active:scale-95 transition-all">
<span class="material-symbols-outlined">share</span>
                            Share with Friends
                        </button>
<button class="flex items-center justify-center gap-2 rounded-full h-14 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-lg font-bold border border-primary/10 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
<span class="material-symbols-outlined">refresh</span>
                            Try Another Style
                        </button>
</div>
<!-- Footer Help -->
<div class="mt-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                            Love your new look? Tag us 
                            <span class="text-primary font-bold">#KStyleMagic</span> 
                            to be featured!
                        </p>
</div>
</div>
</main>
</div>
</div>
</body></html>
